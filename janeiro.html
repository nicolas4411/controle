<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="janeiro.css">
    <title>Controle de Finanças por Mês</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Estilos para organizar o layout */
        .container {
            display: flex;
            justify-content: space-between;
            margin: 20px;
        }

        .financial-info {
            flex: 1;
        }

        .chart-container {
            width: 300px;
            height: 200px;
        }

        .input-group {
            margin-top: 20px;
        }

        .transaction-item {
            margin: 5px 0;
        }

        .transaction-item button {
            margin-left: 10px;
        }

        .transaction-item input[type="checkbox"] {
            margin-left: 10px;
        }

        /* Estilos para o botão de colapso */
        .collapse-container {
            display: none;
            margin-top: 10px;
        }

        .collapse-button {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
            width: 100%;
            text-align: left;
        }

        .collapse-button:hover {
            background-color: #45a049;
        }

        /* Estilo geral para o botão */
        .botao-mes {
            display: inline-block;
            background-color: #4CAF50;
            /* Cor de fundo */
            color: white;
            /* Cor do texto */
            padding: 10px 20px;
            /* Espaçamento interno */
            text-align: center;
            /* Alinhar o texto no centro */
            text-decoration: none;
            /* Remover o sublinhado */
            border-radius: 5px;
            /* Bordas arredondadas */
            font-size: 16px;
            /* Tamanho da fonte */
            transition: background-color 0.3s ease, transform 0.2s ease;
            /* Efeitos de transição */
        }

        /* Efeito de hover (passar o mouse em cima) */
        .botao-mes:hover {
            background-color: #45a049;
            /* Cor de fundo ao passar o mouse */
            transform: translateY(-3px);
            /* Efeito de levantar o botão */
        }

        /* Efeito ao pressionar o botão */
        .botao-mes:active {
            background-color: #388e3c;
            /* Cor de fundo ao pressionar */
            transform: translateY(2px);
            /* Efeito de "pressionar" */
        }

        /* Estilo para dispositivos móveis */
        @media (max-width: 768px) {
            .botao-mes {
                padding: 8px 16px;
                /* Ajuste o padding em telas menores */
                font-size: 14px;
                /* Ajuste o tamanho da fonte em telas menores */
            }
        }

        /* Reset básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Corpo e estrutura geral */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
            color: #333;
        }

        /* Cabeçalho */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 24px;
            color: #4CAF50;
        }

        /* Container principal */
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Caixa de informações financeiras */
        .financial-info {
            background-color: #fff;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .financial-info .balance,
        .financial-info .expenses {
            font-size: 18px;
            margin-bottom: 10px;
        }

        /* Botão de colapso */
        .collapse-button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px;
            font-size: 16px;
            cursor: pointer;
            width: 50%;
            margin-bottom: 15px;
            border-radius: 4px;
        }

        .collapse-button:hover {
            background-color: #45a049;
        }

        /* Contêiner de colapso para a Renda Inicial */
        .collapse-container {
            margin-top: 10px;
            display: none;
            /* Inicialmente escondido */
        }

        /* Campos de Renda Inicial */
        .initial-income {
            margin-bottom: 15px;
        }

        .initial-income label {
            font-size: 16px;
            margin-bottom: 8px;
            display: block;
        }

        .initial-income input {
            width: 80%;
            padding: 8px;
            margin-bottom: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .initial-income button {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            cursor: pointer;
            width: 80%;
            font-size: 16px;
            border-radius: 4px;
        }

        .initial-income button:hover {
            background-color: #45a049;
        }

        /* Display de Renda Inicial */
        #initial-income-display {
            font-size: 18px;
            color: #333;
            margin-top: 10px;
        }

        /* Campos de Transações */
        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        .input-group input,
        .input-group select {
            width: 80%;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .input-group button {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            font-size: 16px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
        }

        .input-group button:hover {
            background-color: #45a049;
        }

        /* Gráfico */
        .chart-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        #financeChart {
            width: 100%;
            height: 400px;
        }

        /* Responsividade para telas menores */
        @media (max-width: 768px) {
            .input-group {
                grid-template-columns: 1fr 1fr;
            }

            .header h1 {
                font-size: 20px;
            }

            .financial-info {
                padding: 15px;
            }

            .collapse-button,
            .initial-income button,
            .input-group button {
                font-size: 14px;
                padding: 8px;
            }

            .initial-income input,
            .input-group input,
            .input-group select {
                font-size: 14px;
                padding: 8px;
            }

            #financeChart {
                height: 300px;
            }
        }

        @media (max-width: 480px) {
            .input-group {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 18px;
            }

            .financial-info {
                padding: 10px;
            }

            .collapse-button,
            .initial-income button,
            .input-group button {
                font-size: 12px;
                padding: 6px;
            }

            .initial-income input,
            .input-group input,
            .input-group select {
                font-size: 12px;
                padding: 6px;
            }

            #financeChart {
                height: 250px;
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Gerenciador de Finanças Mês janeiro</h1>
    </div>
    <a class="botao-mes" id="voltar" href="index.html" name="voltar">voltar</a>

    <div class="container">
        <div class="financial-info">
            <!-- Botão de colapso para a Renda Inicial -->
            <button class="collapse-button" onclick="toggleCollapse()">Definir Renda Inicial</button>
            <div class="collapse-container" id="collapse-container">
                <!-- Campo para inserir a renda inicial -->
                <div class="initial-income">
                    <label for="initial-income">Renda Inicial: R$</label>
                    <input type="number" id="initial-income" placeholder="Digite sua renda inicial" />
                    <button onclick="setInitialIncome()">Definir Renda Inicial</button>
                    <div id="initial-income-display">Renda Inicial: R$ 0,00</div>
                </div>
            </div>

            <div class="balance">Saldo Atual: R$ <span id="balance">0,00</span></div><br>

            <div class="transactions" id="transactions"></div>

            <div class="input-group">
                <input type="text" id="description" placeholder="Descrição">
                <input type="number" id="amount" placeholder="Valor">
                <input type="date" id="payment-date">
                <select id="type">
                    <option value="expense">despesa</option>
                    <option value="income">receita</option>
                </select>
                <button onclick="addTransaction()">Adicionar</button>
            </div>
        </div>

        <!-- Gráfico de finanças -->
        <div class="chart-container">
            <canvas id="financeChart"></canvas>
        </div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];
        const balanceElement = document.getElementById('balance');
        const transactionsElement = document.getElementById('transactions');
        const financeChartElement = document.getElementById('financeChart').getContext('2d');
        let financeChart;
        let initialIncome = parseFloat(localStorage.getItem('initialIncome')) || 0;
        let editingIndex = null;

        // Função para alternar o colapso
        function toggleCollapse() {
            const collapseContainer = document.getElementById('collapse-container');
            collapseContainer.style.display = (collapseContainer.style.display === 'none' || collapseContainer.style.display === '') ? 'block' : 'none';
        }

        // Função para atualizar o saldo inicial
        function setInitialIncome() {
            const income = parseFloat(document.getElementById('initial-income').value);
            if (!isNaN(income) && income > 0) {
                initialIncome = income;
                localStorage.setItem('initialIncome', initialIncome);
                updateUI();
            }
        }

        // Exibir a renda inicial na interface
        function updateInitialIncomeDisplay() {
            const incomeDisplay = document.getElementById('initial-income-display');
            incomeDisplay.textContent = `Renda Inicial: R$ ${initialIncome.toFixed(2)}`;
        }

        // Função para atualizar o LocalStorage
        function updateLocalStorage() {
            localStorage.setItem('transactions', JSON.stringify(transactions));
        }

        // Função para atualizar a interface
        function updateUI() {
            transactionsElement.innerHTML = '';
            let balance = initialIncome;  // Inclui a renda inicial no saldo
            let incomes = initialIncome; // A receita começa com a renda inicial
            let expenses = 0;

            transactions.sort((a, b) => new Date(a.date) - new Date(b.date)); // Organizar as transações por data

            transactions.forEach((transaction, index) => {
                const transactionElement = document.createElement('div');
                transactionElement.classList.add('transaction-item');
                transactionElement.innerHTML = ` 
                  ${transaction.description} - ${transaction.type === 'income' ? 'Receita' : 'Despesa'} - R$ ${transaction.amount.toFixed(2)} 
                  - Data: ${transaction.date} 
                  <button onclick="removeTransaction(${index})">Remover</button>
                  <button onclick="editTransaction(${index})">Editar</button>
                  <label>
                    Pago
                    <input type="checkbox" ${transaction.paid ? 'checked' : ''} onclick="togglePaymentStatus(${index})">
                  </label>
                `;
                transactionsElement.appendChild(transactionElement);

                if (transaction.type === 'income') {
                    incomes += transaction.amount;
                    balance += transaction.amount;
                } else {
                    expenses += transaction.amount;
                    balance -= transaction.amount;
                }
            });

            // Exibir o saldo atual com a cor condicional
            balanceElement.textContent = balance.toFixed(2);
            balanceElement.style.color = balance < 0 ? 'red' : 'black';  // Saldo negativo - vermelho, saldo positivo ou zero - preto

            // Atualizando gráfico
            updateChart(incomes, expenses, balance);

            updateInitialIncomeDisplay();
        }

        // Função para atualizar o gráfico
        function updateChart(incomes, expenses, balance) {
            if (financeChart) financeChart.destroy(); // Destruir gráfico anterior

            financeChart = new Chart(financeChartElement, {
                type: 'bar',
                data: {
                    labels: ['Receitas', 'Despesas', 'Saldo Atual'],
                    datasets: [{
                        label: 'Valor',
                        data: [incomes, expenses, balance],
                        backgroundColor: ['#4CAF50', '#FF6347', '#FFD700'],
                    }]
                },
                options: {
                    scales: {
                        y: { beginAtZero: true }
                    },
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        // Função para adicionar uma nova transação
        function addTransaction() {
            const description = document.getElementById('description').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const type = document.getElementById('type').value;
            const date = document.getElementById('payment-date').value;

            if (description === '' || isNaN(amount) || amount <= 0 || date === '') return;

            const transactionDate = new Date(date);

            const transaction = {
                description,
                amount,
                type,
                date: transactionDate.toISOString().split('T')[0], // Data formatada no formato YYYY-MM-DD
                paid: false // Inicialmente, a transação não é paga
            };

            if (editingIndex !== null) {
                // Atualizar transação existente
                transactions[editingIndex] = transaction;
                editingIndex = null;
            } else {
                // Adicionar nova transação
                transactions.push(transaction);
            }

            updateLocalStorage();
            updateUI();

            // Limpar os campos
            document.getElementById('description').value = '';
            document.getElementById('amount').value = '';
            document.getElementById('payment-date').value = '';
        }

        // Função para remover uma transação
        function removeTransaction(index) {
            transactions.splice(index, 1);
            updateLocalStorage();
            updateUI();
        }

        // Função para editar uma transação
        function editTransaction(index) {
            const transaction = transactions[index]; // Acessa a transação pelo índice diretamente
            document.getElementById('description').value = transaction.description;
            document.getElementById('amount').value = transaction.amount;
            document.getElementById('payment-date').value = transaction.date;
            document.getElementById('type').value = transaction.type;

            // Armazena o índice da transação que está sendo editada
            editingIndex = index;
        }

        // Função para alternar o status de pagamento de uma transação
        function togglePaymentStatus(index) {
            transactions[index].paid = !transactions[index].paid;
            updateLocalStorage();
            updateUI();
        }

        // Inicializando a interface
        updateUI();
    </script>

</body>

</html>
